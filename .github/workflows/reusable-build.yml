name: Reusable build steps

on:
  workflow_call:
  workflow_dispatch:

jobs:
  setup-java-and-cache:
    runs-on: ubuntu-latest
    steps:
    - name: Set up JDK for x64
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        architecture: x64

    - name: Checkout
      uses: actions/checkout@v4

    - name: Restore cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: ~/.m2/repository
        key: cache-{{ hashFiles('**/pom.xml', 'setup-build.xml') }}

    - name: Run setup-build.xml
      if: steps.cache.outputs.cache-hit != 'true'
      run: mvn --batch --file setup-build.xml clean initialize

    - name: Save cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@4
      with:
        path: ~/.m2/repository
        key: cache-{{ hashFiles('**/pom.xml', 'setup-build.xml') }}

