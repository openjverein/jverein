name: Reusable build steps
description: Set up the build environment and bootstrap host artifacts into the local Maven repository
runs:
  using: "composite"
  steps:
  - name: Set up JDK for x64
    uses: actions/setup-java@v5
    with:
      java-version: '17'
      distribution: 'temurin'
      architecture: x64
      cache: 'maven'

  - name: Read host artifact coordinates from Maven
    id: host-artifact-coordinates
    shell: bash
    run: |
      local_repo=$(mvn -q -f jverein/pom.xml help:evaluate -Dexpression=settings.localRepository -DforceStdout | tail -n1)
      jameica_version=$(mvn -q -f jverein/pom.xml help:evaluate -Dexpression=jameica.version -DforceStdout | tail -n1)
      hibiscus_version=$(mvn -q -f jverein/pom.xml help:evaluate -Dexpression=hibiscus.version -DforceStdout | tail -n1)
      obantoo_version=$(mvn -q -f jverein/pom.xml help:evaluate -Dexpression=obantoo.version -DforceStdout | tail -n1)

      echo "local_repo=$local_repo" >> "$GITHUB_OUTPUT"
      echo "jameica_version=$jameica_version" >> "$GITHUB_OUTPUT"
      echo "hibiscus_version=$hibiscus_version" >> "$GITHUB_OUTPUT"
      echo "obantoo_version=$obantoo_version" >> "$GITHUB_OUTPUT"

  - name: Check host artifacts in local Maven repository
    id: host-artifacts
    shell: bash
    run: |
      local_repo="${{ steps.host-artifact-coordinates.outputs.local_repo }}"
      jameica_version="${{ steps.host-artifact-coordinates.outputs.jameica_version }}"
      hibiscus_version="${{ steps.host-artifact-coordinates.outputs.hibiscus_version }}"
      obantoo_version="${{ steps.host-artifact-coordinates.outputs.obantoo_version }}"

      missing=0
      for artifact in \
        "$local_repo/de/willuhn/jameica-lib/$jameica_version/jameica-lib-$jameica_version.jar" \
        "$local_repo/de/willuhn/hibiscus-lib/$hibiscus_version/hibiscus-lib-$hibiscus_version.jar" \
        "$local_repo/de/willuhn/de-willuhn-ds/$jameica_version/de-willuhn-ds-$jameica_version.jar" \
        "$local_repo/de/willuhn/de-willuhn-util/$jameica_version/de-willuhn-util-$jameica_version.jar" \
        "$local_repo/de/jost_net/obantoo-bin/$obantoo_version/obantoo-bin-$obantoo_version.jar"
      do
        if [ ! -f "$artifact" ]; then
          missing=1
          break
        fi
      done

      echo "missing=$missing" >> "$GITHUB_OUTPUT"

  - name: Bootstrap Jameica and Hibiscus host artifacts
    if: steps.host-artifacts.outputs.missing == '1'
    shell: bash
    run: mvn -B -f jverein/pom.xml -Dbootstrap.host.artifacts=true -Pbootstrap-host-artifacts generate-sources
